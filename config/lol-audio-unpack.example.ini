[app]
# 必填：本地完整客户端根目录
game_path = D:/Games/Tencent/WeGameApps/英雄联盟

# 必填：输出目录
output_path = ./output

# 以下是常见默认值示例；保持注释即可沿用默认值
# source_mode = local_path
# game_region = zh_CN
# exclude_type = SFX,MUSIC
# group_by_type = false
# wwiser_path =
# remote_live_region = EUW
# cleanup_remote = true

# 如需 remote_snapshot 固定到某个远端快照，再同时取消下面三项注释并填写
# remote_version =
# remote_lcu_manifest_url =
# remote_game_manifest_url =

[targets]
# 多个动作共享的实体范围；留空或保持注释表示全量
# champions = Annie,Ahri
# maps = 11,12

[runtime]
# 通用执行参数；不写则沿用默认值
# max_workers = 4

[update]
# enable = false
# 以下是默认值示例；通常不需要手动提供
# force = false
# skip_events = false

[extract]
# enable = false
# extract 动作当前没有其他独立参数

[wav]
# WAV 动作与其他动作同级；细节参数统一放在本分组
# enable = false
# wav_workers = 2
# wav_timeout = 5
# wav_retries = 3
# wav_format = pcm16

[mapping]
# enable = false
# 以下是默认值示例；通常不需要手动提供
# integrate_data = true
