[app]
# 必填：本地完整客户端根目录
game_path = D:/Games/Tencent/WeGameApps/英雄联盟

# 必填：输出目录
output_path = ./output

# 以下是常见默认值示例；保持注释即可沿用默认值
# source_mode = local_path
# game_region = zh_CN
# exclude_type = SFX,MUSIC
# group_by_type = false
# wwiser_path =
# remote_live_region = EUW
# cleanup_remote = true

# 如需 remote_snapshot 固定到某个远端快照，再同时取消下面三项注释并填写
# remote_version =
# remote_lcu_manifest_url =
# remote_game_manifest_url =

[update]
# 支持逗号分隔的 ID 或 alias；留空或保持注释表示全量
# champions = Annie,Ahri
# maps = 11,12

# 以下是默认值示例；通常不需要手动提供
# force = false
# skip_events = false

[extract]
# 支持逗号分隔的 ID 或 alias；留空或保持注释表示全量
# champions = Annie,Ahri
# maps = 11,12

# 只有 `wav` 常见于任务级切换；其余大多保持默认即可
# wav = false

# 以下是默认值示例；通常不需要手动提供
# max_workers = 4
# wav_workers = 2
# wav_timeout = 5
# wav_retries = 3
# wav_format = pcm16

[mapping]
# 支持逗号分隔的 ID 或 alias；留空或保持注释表示全量
# champions = Annie
# maps = 11,12

# 以下是默认值示例；通常不需要手动提供
# max_workers = 4
# integrate_data = true
